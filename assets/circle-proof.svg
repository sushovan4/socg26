<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 210" style="max-height: 260px;">

  <!-- ===== PANEL 1: triangulate S^1, map to shortest paths ===== -->
  <g transform="translate(110, 100)">
    <circle cx="0" cy="0" r="64" fill="none" stroke="#2b211a" stroke-width="1.8" opacity="0.85"/>
    <!-- sample points on the circle (triangulation vertices) -->
    <g fill="#6c1d1a" stroke="#f5efde" stroke-width="0.8">
      <circle cx="0" cy="-64" r="3.4"/>
      <circle cx="55" cy="-32" r="3.4"/>
      <circle cx="62" cy="16" r="3.4"/>
      <circle cx="20" cy="61" r="3.4"/>
      <circle cx="-44" cy="46" r="3.4"/>
      <circle cx="-62" cy="-14" r="3.4"/>
    </g>
    <!-- chords (shortest-path images) -->
    <g stroke="#2b211a" stroke-width="0.7" fill="none" opacity="0.6">
      <line x1="0" y1="-64" x2="55" y2="-32"/>
      <line x1="55" y1="-32" x2="62" y2="16"/>
      <line x1="62" y1="16" x2="20" y2="61"/>
      <line x1="20" y1="61" x2="-44" y2="46"/>
      <line x1="-44" y1="46" x2="-62" y2="-14"/>
      <line x1="-62" y1="-14" x2="0" y2="-64"/>
    </g>
  </g>
  <text x="110" y="192" fill="#57473a" font-family="Alegreya SC, EB Garamond, Georgia, serif" font-size="9" letter-spacing="1.3" text-anchor="middle">TRIANGULATE</text>

  <!-- arrow -->
  <g stroke="#6c1d1a" fill="none" stroke-width="0.9"><line x1="186" y1="100" x2="226" y2="100"/><path d="M 219 96 L 226 100 L 219 104"/></g>

  <!-- ===== PANEL 2: f-bar misses an arc => degree zero ===== -->
  <g transform="translate(300, 100)">
    <circle cx="0" cy="0" r="64" fill="none" stroke="#c8b894" stroke-width="1" stroke-dasharray="3 3"/>
    <!-- covered part -->
    <path d="M 0 -64 A 64 64 0 1 1 -45 45" fill="none" stroke="#6c1d1a" stroke-width="2.4"/>
    <!-- missed arc label -->
    <path d="M -45 45 A 64 64 0 0 1 0 -64" fill="none" stroke="#2b211a" stroke-width="0.8" stroke-dasharray="2 3" opacity="0.5"/>
  </g>
  <text x="358" y="92" fill="#6c1d1a" font-family="EB Garamond, Georgia, serif" font-style="italic" font-size="11" text-anchor="middle">missed</text>
  <text x="300" y="192" fill="#57473a" font-family="Alegreya SC, EB Garamond, Georgia, serif" font-size="9" letter-spacing="1.3" text-anchor="middle">DEGREE ZERO</text>

  <!-- arrow -->
  <g stroke="#6c1d1a" fill="none" stroke-width="0.9"><line x1="376" y1="100" x2="416" y2="100"/><path d="M 409 96 L 416 100 L 409 104"/></g>

  <!-- ===== PANEL 3: Borsuk-Ulam => antipodal x, -x same image; arcs cross ===== -->
  <g transform="translate(560, 100)">
    <circle cx="0" cy="0" r="64" fill="none" stroke="#2b211a" stroke-width="1.8" opacity="0.85"/>
    <!-- antipodal diameter -->
    <line x1="-56" y1="-31" x2="56" y2="31" stroke="#c8b894" stroke-width="1" stroke-dasharray="4 3"/>
    <!-- antipodal points -->
    <g fill="#2b211a" stroke="#f5efde" stroke-width="1">
      <circle cx="-56" cy="-31" r="4.2"/>
      <circle cx="56" cy="31" r="4.2"/>
    </g>
    <!-- neighbouring images + crossing chords -->
    <g fill="#6c1d1a" stroke="#f5efde" stroke-width="0.8">
      <circle cx="-28" cy="-58" r="3"/>
      <circle cx="28" cy="-58" r="3"/>
      <circle cx="-28" cy="58" r="3"/>
      <circle cx="28" cy="58" r="3"/>
    </g>
    <g stroke="#6c1d1a" stroke-width="1.3" fill="none">
      <line x1="-28" y1="-58" x2="28" y2="58"/>
      <line x1="28" y1="-58" x2="-28" y2="58"/>
    </g>
    <circle cx="0" cy="0" r="3.2" fill="#6c1d1a" stroke="#f5efde" stroke-width="0.8"/>
    <text x="-72" y="-30" fill="#2b211a" font-family="EB Garamond, Georgia, serif" font-style="italic" font-size="13">x</text>
    <text x="62" y="40" fill="#2b211a" font-family="EB Garamond, Georgia, serif" font-style="italic" font-size="13">-x</text>
  </g>
  <text x="560" y="192" fill="#57473a" font-family="Alegreya SC, EB Garamond, Georgia, serif" font-size="9" letter-spacing="1.3" text-anchor="middle">ARCS CROSS</text>

</svg>
