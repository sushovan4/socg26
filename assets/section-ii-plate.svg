<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" preserveAspectRatio="xMidYMid meet">

  <!-- inner frame rule -->
  <rect x="36" y="36" width="648" height="328" fill="none" stroke="#c8b894" stroke-width="0.6"/>

  <!-- title masthead -->
  <text x="360" y="68" fill="#6c1d1a" font-family="Alegreya SC, EB Garamond, Georgia, serif" font-weight="500" font-size="16" letter-spacing="4" text-anchor="middle">THE CASE OF THE CIRCLE</text>

  <!-- italic deck -->
  <text x="360" y="92" fill="#57473a" font-family="EB Garamond, Georgia, serif" font-style="italic" font-size="13" text-anchor="middle">— we double the density tolerance, from π/6 to π/3, and it is optimal —</text>

  <!-- horizontal hairline -->
  <line x1="120" y1="104" x2="600" y2="104" stroke="#c8b894" stroke-width="0.5"/>

  <!-- ART: close-up of the codomain S^1 where the two shortest-path arcs cross (the punchline) -->
  <circle cx="360" cy="242" r="92" fill="none" stroke="#2b211a" stroke-width="2.6" opacity="0.9"/>
  <!-- two shortest paths between neighbouring images, crossing at the shared image -->
  <g fill="none" stroke="#6c1d1a" stroke-width="4.6" stroke-opacity="0.82" stroke-linecap="round">
    <path d="M 295 178 Q 360 138 409 165"/>
    <path d="M 425 178 Q 360 138 311 165"/>
  </g>
  <!-- neighbouring images (arc endpoints) -->
  <g fill="#6c1d1a" stroke="#f5efde" stroke-width="1.2">
    <circle cx="295" cy="178" r="4"/><circle cx="409" cy="165" r="4"/>
    <circle cx="425" cy="178" r="4"/><circle cx="311" cy="165" r="4"/>
  </g>
  <!-- the shared image, where the two arcs cross -->
  <circle cx="360" cy="154" r="5.5" fill="#2b211a" stroke="#f5efde" stroke-width="1.4"/>
  <text x="360" y="124" fill="#6c1d1a" font-family="EB Garamond, Georgia, serif" font-style="italic" font-size="15" text-anchor="middle"><tspan text-decoration="overline">f</tspan>(x) = <tspan text-decoration="overline">f</tspan>(-x)</text>
  <text x="360" y="300" fill="#57473a" font-family="EB Garamond, Georgia, serif" font-style="italic" font-size="13" text-anchor="middle">by Borsuk–Ulam</text>

  <!-- corner fleurons -->
  <g fill="#c8b894" stroke="none">
    <g transform="translate(52, 52) scale(0.9)">
      <path d="M 0 -8 Q 5 -3 0 0 Q -5 -3 0 -8 Z"/>
      <path d="M 0 8  Q 5 3  0 0 Q -5 3  0 8  Z"/>
      <path d="M -8 0 Q -3 -5 0 0 Q -3 5 -8 0 Z"/>
      <path d="M 8 0  Q 3 -5  0 0 Q 3 5  8 0  Z"/>
      <circle cx="0" cy="0" r="2.0"/>
    </g>
    <g transform="translate(668, 52) scale(0.9)">
      <path d="M 0 -8 Q 5 -3 0 0 Q -5 -3 0 -8 Z"/>
      <path d="M 0 8  Q 5 3  0 0 Q -5 3  0 8  Z"/>
      <path d="M -8 0 Q -3 -5 0 0 Q -3 5 -8 0 Z"/>
      <path d="M 8 0  Q 3 -5  0 0 Q 3 5  8 0  Z"/>
      <circle cx="0" cy="0" r="2.0"/>
    </g>
    <g transform="translate(52, 348) scale(0.9)">
      <path d="M 0 -8 Q 5 -3 0 0 Q -5 -3 0 -8 Z"/>
      <path d="M 0 8  Q 5 3  0 0 Q -5 3  0 8  Z"/>
      <path d="M -8 0 Q -3 -5 0 0 Q -3 5 -8 0 Z"/>
      <path d="M 8 0  Q 3 -5  0 0 Q 3 5  8 0  Z"/>
      <circle cx="0" cy="0" r="2.0"/>
    </g>
    <g transform="translate(668, 348) scale(0.9)">
      <path d="M 0 -8 Q 5 -3 0 0 Q -5 -3 0 -8 Z"/>
      <path d="M 0 8  Q 5 3  0 0 Q -5 3  0 8  Z"/>
      <path d="M -8 0 Q -3 -5 0 0 Q -3 5 -8 0 Z"/>
      <path d="M 8 0  Q 3 -5  0 0 Q 3 5  8 0  Z"/>
      <circle cx="0" cy="0" r="2.0"/>
    </g>
  </g>

  <!-- caption stripe -->
  <text x="360" y="356" fill="#57473a" font-family="Alegreya SC, EB Garamond, Georgia, serif" font-size="11" letter-spacing="3" text-anchor="middle">— ANTIPODAL POINTS, ONE IMAGE, CROSSING ARCS —</text>
</svg>
