<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 22 720 212" style="max-height: 162px;" font-family="EB Garamond, Georgia, serif">

  <!-- palette: a=red b=teal c=ochre d=blue e=plum f=olive (matched arc <-> point) -->

  <!-- ============ (a) THE CORRESPONDENCE: S^1 partitioned into colored preimage arcs ============ -->
  <g transform="translate(196, 112)">
    <circle r="66" fill="none" stroke="#2b211a" stroke-width="1.3" opacity="0.4"/>

    <!-- two large preimage arcs (2pi/3 - 2eps): a left, b right -->
    <path d="M -38 -54 A 66 66 0 0 0 -38 54" fill="none" stroke="#9d2b22" stroke-width="6.6" stroke-linecap="butt"/>
    <path d="M 38 -54 A 66 66 0 0 1 38 54"   fill="none" stroke="#2e6b70" stroke-width="6.6" stroke-linecap="butt"/>
    <!-- four small preimage arcs (pi/6 + eps): c,d top  e,f bottom -->
    <path d="M -38 -54 A 66 66 0 0 1 -3 -66" fill="none" stroke="#9c7a1f" stroke-width="6.6" stroke-linecap="butt"/>
    <path d="M 3 -66 A 66 66 0 0 1 38 -54"   fill="none" stroke="#3f5a8a" stroke-width="6.6" stroke-linecap="butt"/>
    <path d="M -3 66 A 66 66 0 0 1 -38 54"   fill="none" stroke="#7d3a60" stroke-width="6.6" stroke-linecap="butt"/>
    <path d="M 38 54 A 66 66 0 0 1 3 66"     fill="none" stroke="#54702f" stroke-width="6.6" stroke-linecap="butt"/>

    <!-- boundary ticks between the preimage arcs -->
    <g stroke="#f5efde" stroke-width="2.4">
      <line x1="34" y1="-49" x2="42" y2="-59"/>
      <line x1="34" y1="49" x2="42" y2="59"/>
      <line x1="-34" y1="-49" x2="-42" y2="-59"/>
      <line x1="-34" y1="49" x2="-42" y2="59"/>
      <line x1="0" y1="-60" x2="0" y2="-72"/>
      <line x1="0" y1="60" x2="0" y2="72"/>
    </g>

    <!-- arc labels R^-1(x), colored to match the image point -->
    <g font-style="italic" font-size="10" font-weight="600" text-anchor="middle">
      <text x="-96" y="4" fill="#9d2b22">R<tspan baseline-shift="super" font-size="0.62em" font-style="normal">−1</tspan>(a)</text>
      <text x="96" y="4" fill="#2e6b70">R<tspan baseline-shift="super" font-size="0.62em" font-style="normal">−1</tspan>(b)</text>
      <text x="-34" y="-79" fill="#9c7a1f">R<tspan baseline-shift="super" font-size="0.62em" font-style="normal">−1</tspan>(c)</text>
      <text x="34" y="-79" fill="#3f5a8a">R<tspan baseline-shift="super" font-size="0.62em" font-style="normal">−1</tspan>(d)</text>
      <text x="-34" y="93" fill="#7d3a60">R<tspan baseline-shift="super" font-size="0.62em" font-style="normal">−1</tspan>(e)</text>
      <text x="34" y="93" fill="#54702f">R<tspan baseline-shift="super" font-size="0.62em" font-style="normal">−1</tspan>(f)</text>
    </g>

    <text x="0" y="-3" fill="#2b211a" font-style="italic" font-size="12" text-anchor="middle">dis R = 2π/3</text>
    <text x="0" y="13" fill="#6c1d1a" font-style="italic" font-size="11" text-anchor="middle">⟹ d<tspan baseline-shift="sub" font-size="0.7em">GH</tspan> ≤ π/3</text>
  </g>
  <text x="196" y="218" fill="#57473a" font-family="Alegreya SC, EB Garamond, Georgia, serif" font-size="9.5" letter-spacing="1.2" text-anchor="middle">(a)  CORRESPONDENCE R  —  long arcs 2π/3−2ε, short π/6+ε</text>

  <!-- ============ (b) THE CONFIGURATION X: colored points; d_H = half the widest gap ============ -->
  <g transform="translate(524, 112)">
    <circle r="66" fill="none" stroke="#2b211a" stroke-width="1.6" opacity="0.85"/>

    <!-- the widest gap (bottom): 2pi/3 + 2eps -->
    <path d="M -57 33 A 66 66 0 0 0 57 33" fill="none" stroke="#c8b894" stroke-width="2.2" stroke-dasharray="3 3"/>
    <!-- d_H = worst-case point (gap midpoint) to its nearest sample = half the gap -->
    <path d="M 0 66 A 66 66 0 0 0 57 33" fill="none" stroke="#2b211a" stroke-width="4.4" stroke-opacity="0.85"/>
    <circle cx="0" cy="66" r="3.4" fill="#f5efde" stroke="#2b211a" stroke-width="1.4"/>

    <!-- six colored points (matched to their preimage arcs) -->
    <g stroke="#f5efde" stroke-width="1.2">
      <circle cx="-33" cy="-57" r="5.4" fill="#9c7a1f"/>
      <circle cx="33" cy="-57" r="5.4" fill="#54702f"/>
      <circle cx="-66" cy="0" r="5.4" fill="#7d3a60"/>
      <circle cx="66" cy="0" r="5.4" fill="#3f5a8a"/>
      <circle cx="-57" cy="33" r="5.4" fill="#9d2b22"/>
      <circle cx="57" cy="33" r="5.4" fill="#2e6b70"/>
    </g>
    <!-- point names, just inside the circle, colored to match -->
    <g font-style="italic" font-size="11" font-weight="600" text-anchor="middle">
      <text x="-27" y="-44" fill="#9c7a1f">c</text>
      <text x="27" y="-44" fill="#54702f">f</text>
      <text x="-53" y="-3" fill="#7d3a60">e</text>
      <text x="53" y="-3" fill="#3f5a8a">d</text>
      <text x="-42" y="25" fill="#9d2b22">a</text>
      <text x="42" y="25" fill="#2e6b70">b</text>
    </g>

    <!-- the six inter-point gap distances, outside the circle (cf. paper Fig. 3b) -->
    <g fill="#57473a" font-style="italic" font-size="9.5" text-anchor="middle">
      <text x="0" y="-80">π/3</text>
      <text x="-82" y="-46">π/3</text>
      <text x="82" y="-46">π/3</text>
      <text x="-95" y="24">π/6−ε</text>
      <text x="95" y="24">π/6−ε</text>
      <text x="-48" y="93">2π/3+2ε</text>
    </g>
    <text x="38" y="93" fill="#6c1d1a" font-style="italic" font-size="10" text-anchor="start">d<tspan baseline-shift="sub" font-size="0.7em">H</tspan> = π/3+ε</text>
  </g>
  <text x="524" y="218" fill="#57473a" font-family="Alegreya SC, EB Garamond, Georgia, serif" font-size="9.5" letter-spacing="1.2" text-anchor="middle">(b)  CONFIGURATION X = {a, …, f} ⊂ S¹</text>

  <!-- separating rule -->
  <line x1="360" y1="56" x2="360" y2="176" stroke="#c8b894" stroke-width="0.6"/>
</svg>
