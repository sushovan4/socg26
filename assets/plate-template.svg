<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" preserveAspectRatio="xMidYMid meet">
  <!--
    BROADSHEET SECTION-DIVIDER PLATE — copy this file once per section
    (e.g., motivation-plate.svg, theory-plate.svg). Replace masthead
    title, italic deck, art content, and bottom caption stripe. Keep:
      * inner frame rule (line 7)
      * 4 corner fleurons (SVG paths, font-independent — never use Unicode ❦)
      * horizontal hairline under the deck
      * Alegreya SC + EB Garamond font stacks
      * palette: oxblood #6c1d1a, ink #2b211a, sepia #57473a, parchment #c8b894
  -->

  <!-- inner frame rule -->
  <rect x="36" y="36" width="648" height="328" fill="none" stroke="#c8b894" stroke-width="0.6"/>

  <!-- title masthead — REPLACE -->
  <text x="360" y="68" fill="#6c1d1a" font-family="Alegreya SC, EB Garamond, Georgia, serif" font-weight="500" font-size="16" letter-spacing="4" text-anchor="middle">SECTION TITLE</text>

  <!-- italic deck — REPLACE -->
  <text x="360" y="92" fill="#57473a" font-family="EB Garamond, Georgia, serif" font-style="italic" font-size="13" text-anchor="middle">— one-line italic deck under the title —</text>

  <!-- horizontal hairline -->
  <line x1="120" y1="104" x2="600" y2="104" stroke="#c8b894" stroke-width="0.5"/>

  <!-- ===========================================================
       ART CONTENT GOES HERE — fill the region roughly y∈[110, 320]
       Use the palette + line weights consistent with the frame.
       =========================================================== -->

  <!-- corner fleurons — house 4-petal florettes (font-independent SVG paths) -->
  <g fill="#c8b894" stroke="none">
    <g transform="translate(52, 52) scale(0.9)">
      <path d="M 0 -8 Q 5 -3 0 0 Q -5 -3 0 -8 Z"/>
      <path d="M 0 8  Q 5 3  0 0 Q -5 3  0 8  Z"/>
      <path d="M -8 0 Q -3 -5 0 0 Q -3 5 -8 0 Z"/>
      <path d="M 8 0  Q 3 -5  0 0 Q 3 5  8 0  Z"/>
      <circle cx="0" cy="0" r="2.0"/>
    </g>
    <g transform="translate(668, 52) scale(0.9)">
      <path d="M 0 -8 Q 5 -3 0 0 Q -5 -3 0 -8 Z"/>
      <path d="M 0 8  Q 5 3  0 0 Q -5 3  0 8  Z"/>
      <path d="M -8 0 Q -3 -5 0 0 Q -3 5 -8 0 Z"/>
      <path d="M 8 0  Q 3 -5  0 0 Q 3 5  8 0  Z"/>
      <circle cx="0" cy="0" r="2.0"/>
    </g>
    <g transform="translate(52, 348) scale(0.9)">
      <path d="M 0 -8 Q 5 -3 0 0 Q -5 -3 0 -8 Z"/>
      <path d="M 0 8  Q 5 3  0 0 Q -5 3  0 8  Z"/>
      <path d="M -8 0 Q -3 -5 0 0 Q -3 5 -8 0 Z"/>
      <path d="M 8 0  Q 3 -5  0 0 Q 3 5  8 0  Z"/>
      <circle cx="0" cy="0" r="2.0"/>
    </g>
    <g transform="translate(668, 348) scale(0.9)">
      <path d="M 0 -8 Q 5 -3 0 0 Q -5 -3 0 -8 Z"/>
      <path d="M 0 8  Q 5 3  0 0 Q -5 3  0 8  Z"/>
      <path d="M -8 0 Q -3 -5 0 0 Q -3 5 -8 0 Z"/>
      <path d="M 8 0  Q 3 -5  0 0 Q 3 5  8 0  Z"/>
      <circle cx="0" cy="0" r="2.0"/>
    </g>
  </g>

  <!-- caption stripe at bottom — REPLACE -->
  <text x="360" y="356" fill="#57473a" font-family="Alegreya SC, EB Garamond, Georgia, serif" font-size="11" letter-spacing="3" text-anchor="middle">— SHORT CAPS-LOCK CAPTION —</text>
</svg>
